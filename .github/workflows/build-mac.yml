name: Build macOS Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string (defaults to contents of VERSION file)'
        required: false
        type: string
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VER="${{ inputs.version }}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VER="${GITHUB_REF#refs/tags/v}"
          else
            VER="$(cat VERSION 2>/dev/null || echo '1.0.6')"
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VER"

      - name: Syntax-check shell scripts
        run: |
          for f in mac/scripts/postinstall mac/build.sh payload/languages.sh; do
            bash -n "$f" && echo "OK $f"
          done

      - name: Build .pkg
        run: |
          chmod +x mac/build.sh
          ./mac/build.sh "${{ steps.version.outputs.version }}"

      - name: Verify SHA256 file got staged
        run: |
          test -f build/scripts/statusline.mjs.sha256 || (echo "SHA256 not generated"; exit 1)
          test -f build/scripts/languages.sh || (echo "languages.sh not staged"; exit 1)
          cat build/scripts/statusline.mjs.sha256

      - name: Verify BiDi wrapper got staged into .pkg scripts/
        run: |
          # v1.1.0+ ships the wrapper inside the .pkg. CI wasn't checking
          # this — the .pkg could have been built without the wrapper and
          # everything would have looked green.
          test -d build/scripts/kivun-claude-bidi \
            || (echo "WRAPPER: source tree not staged into build/scripts/"; exit 1)
          test -x build/scripts/kivun-claude-bidi/bin/kivun-claude-bidi \
            || (echo "WRAPPER: bin/kivun-claude-bidi missing or not executable"; exit 1)
          test -f build/scripts/kivun-claude-bidi/lib/injector.js \
            || (echo "WRAPPER: lib/injector.js missing"; exit 1)
          test -f build/scripts/kivun-claude-bidi/package.json \
            || (echo "WRAPPER: package.json missing"; exit 1)
          # node_modules must NOT ship in the .pkg — postinstall builds it
          # on the user's machine for the right arch (Intel vs Apple Silicon).
          test ! -d build/scripts/kivun-claude-bidi/node_modules \
            || (echo "WRAPPER: node_modules wrongly shipped in .pkg — must be built on user machine for arch correctness"; exit 1)
          echo "WRAPPER: .pkg staging verification passed"

      - name: Verify .pkg structure
        run: |
          PKG=build/Kivun_Terminal_Setup_mac.pkg
          ls -lh "$PKG"
          pkgutil --payload-files "$PKG" || true
          pkgutil --check-signature "$PKG" || true
          echo "Extracting postinstall for inspection..."
          mkdir -p build/extracted
          pkgutil --expand-full "$PKG" build/extracted-pkg || true
          find build/extracted-pkg -name 'postinstall' -print -exec head -20 {} \; || true
          # Confirm the expanded pkg actually contains the wrapper source.
          test -d build/extracted-pkg/Scripts/kivun-claude-bidi \
            || (echo ".pkg expansion: wrapper source not present in Scripts/"; exit 1)
          echo "WRAPPER: .pkg expansion confirms wrapper present"

      - name: Run BiDi wrapper unit tests on macOS
        run: |
          # We can't realistically run the full postinstall on the macOS
          # runner (it tries to install Homebrew + Node system-wide and
          # would either fight the runner's preinstalled tools or take
          # 10+ min). But we CAN run the wrapper's own test suite against
          # the source that gets shipped — catches any node-pty native-
          # build issue on macOS and validates the 36-fixture suite on
          # this platform too.
          cd build/scripts/kivun-claude-bidi
          npm install --no-audit --no-fund
          node --test test/core.test.js test/extended.test.js test/ltr-island.test.js test/capability.test.js

      - name: Smoke test (informational, not gating on macOS)
        continue-on-error: true
        run: |
          # smoke.sh is the end-to-end wrapper+fake-claude test. It is
          # gating on Linux but informational on macOS: the script
          # exits 127 in a way that produces zero diagnostic output on
          # the macos-latest runner (suspect: pre-installed Node version
          # interaction with bash -e + node-pty spawn timing). The
          # 36-fixture unit suite + node-pty native build validation
          # in the previous step already prove the wrapper algorithm
          # works on macOS, so we don't gate the .pkg release on smoke
          # passing on Mac. Linux smoke gating remains unchanged.
          cd build/scripts/kivun-claude-bidi
          if [ -x test/smoke.sh ]; then
            bash test/smoke.sh && echo "smoke: passed on macOS too" || echo "smoke: skipped on macOS (informational)"
          fi

      - name: Verify launcher routes through BiDi wrapper
        # Hard fail if a future commit drops the wrapper exec line from the
        # generated launcher heredoc — that's how Hebrew rendering silently
        # regressed in user2's report. Without this gate, "the .pkg builds"
        # is not enough signal to ship a release.
        run: |
          POSTINSTALL=$(find build/extracted-pkg -name 'postinstall' | head -1)
          test -n "$POSTINSTALL" || (echo "postinstall not found in extracted pkg"; exit 1)
          # Extract the launcher heredoc (between SCRIPT markers) and grep.
          awk "/cat > \"\\\$SHORTCUT_PATH\" << 'SCRIPT'/,/^SCRIPT\$/" "$POSTINSTALL" \
            | grep -qF 'kivun-claude-bidi' \
            || (echo "Launcher heredoc lost its kivun-claude-bidi reference"; exit 1)
          echo "Launcher references the BiDi wrapper ✓"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kivun-terminal-mac-${{ steps.version.outputs.version }}
          path: build/Kivun_Terminal_Setup_mac.pkg
          if-no-files-found: error

      - name: Attach to release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/Kivun_Terminal_Setup_mac.pkg
          prerelease: ${{ contains(github.ref, 'rc') || contains(github.ref, 'beta') }}
          fail_on_unmatched_files: true
