name: Validate launcher behavior on Windows

# Runs the actual kivun-terminal.bat against a real Windows + WSL Ubuntu
# environment, then asserts the v1.1.1 bugfix invariants on LAUNCH_LOG.txt.
#
# Why this exists: PR #8 fixed the "Claude not found -> launcher claims
# fallback then crashes" bug, but build-windows.yml only builds the .exe
# without ever running the .bat. Without this workflow, the v1.1.1
# guarantees were spec-translated and pattern-matched but never executed
# end-to-end. The user-reported bug burned someone once already; this
# workflow makes sure it can't silently regress.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'payload/kivun-terminal.bat'
      - 'payload/kivun-launch.sh'
      - 'payload/kivun-direct.sh'
      - '.github/workflows/validate-launcher-windows.yml'
  pull_request:
    branches: [main]
    paths:
      - 'payload/kivun-terminal.bat'
      - 'payload/kivun-launch.sh'
      - 'payload/kivun-direct.sh'
      - '.github/workflows/validate-launcher-windows.yml'

# Disable Git Bash's MSYS auto-conversion of POSIX paths to Windows paths
# when invoking native Windows executables like wsl.exe. Without these,
# `wsl -- bash "/mnt/d/.../script.sh"` arrives inside WSL as
# `bash "C:/Program Files/Git/mnt/d/.../script.sh"` (the leading `/` made
# Git Bash prepend its install root). Setting both vars covers old/new
# MSYS naming so every step that calls wsl from `shell: bash` gets
# verbatim path args.
env:
  MSYS_NO_PATHCONV: '1'
  MSYS2_ARG_CONV_EXCL: '*'

jobs:

  # -------------------------------------------------------------------------
  # Job 1 — Static checks on the .bat (~30 sec, no WSL needed).
  # Catches the obvious class of regressions: a goto/call to a label that
  # doesn't exist (the kind of bug that ships only because the failing path
  # is rarely exercised, which is exactly the v1.1.1 bug shape).
  # -------------------------------------------------------------------------
  static-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Verify every label referenced via goto/call exists
        run: |
          set -eu
          BAT=payload/kivun-terminal.bat
          # Extract all label definitions (lines starting with ":NAME").
          # grep -o keeps only the label token, dropping CRLF and any inline
          # comment that might sit on the rest of the line.
          mapfile -t labels < <(grep -oE '^:[a-zA-Z_][a-zA-Z0-9_]*' "$BAT" | sed 's/^://' | sort -u)
          echo "Labels defined:"
          printf '  %s\n' "${labels[@]}"
          # Extract all goto/call target labels.
          mapfile -t refs < <(grep -oiE '(goto|call) :[a-zA-Z_][a-zA-Z0-9_]*' "$BAT" | awk '{print $2}' | sed 's/^://' | sort -u)
          echo "Labels referenced:"
          printf '  %s\n' "${refs[@]}"
          fail=0
          for ref in "${refs[@]}"; do
            found=0
            for lbl in "${labels[@]}"; do
              if [ "$ref" = "$lbl" ]; then found=1; break; fi
            done
            if [ "$found" -eq 0 ]; then
              echo "FAIL: label :$ref referenced but not defined in $BAT"
              fail=1
            fi
          done
          [ "$fail" -eq 0 ] && echo "PASS: all label refs resolve"
          exit $fail

      - name: Verify v1.1.1 invariants (CLAUDE_IN_WSL flag + new helpers)
        run: |
          set -eu
          BAT=payload/kivun-terminal.bat
          # The v1.1.1 fix relies on three things being present and connected.
          # If any of these go missing, the Claude-not-found-then-crash bug
          # comes back.
          grep -q '^:INSTALL_CLAUDE_WSL' "$BAT" \
            || (echo "FAIL: :INSTALL_CLAUDE_WSL helper missing"; exit 1)
          grep -q '^:no_claude_exit' "$BAT" \
            || (echo "FAIL: :no_claude_exit helper missing"; exit 1)
          grep -q 'CLAUDE_IN_WSL' "$BAT" \
            || (echo "FAIL: CLAUDE_IN_WSL flag not used (v1.1.1 guard removed?)"; exit 1)
          # The :run_direct block must check CLAUDE_IN_WSL before invoking claude.
          # Look for the guard pattern within ~10 lines after :run_direct.
          awk '/^:run_direct/{in_block=1; lines=0} in_block{print; lines++; if(lines>15) exit}' "$BAT" \
            | grep -q 'CLAUDE_IN_WSL' \
            || (echo "FAIL: :run_direct does not check CLAUDE_IN_WSL — the bug is back"; exit 1)
          # The deprecated install message must be gone.
          ! grep -q 'sudo npm install -g @anthropic-ai/claude-code' "$BAT" \
            || (echo "FAIL: deprecated 'sudo npm install -g' message still in .bat"; exit 1)
          echo "PASS: all v1.1.1 invariants intact"

      - name: Verify v1.4.0 env-var loading invariants (Windows + Linux + picker)
        run: |
          set -eu
          BAT=payload/kivun-terminal.bat
          SH=linux/kivun-launch.sh
          HTA=payload/folder-picker.hta

          # ---- .bat side: env-load block + :ADDENV + WSLENV propagation ----
          # The env-load block is essentially three pieces. If any goes missing,
          # users will silently see "I set ANTHROPIC_API_KEY in my profile but
          # claude doesn't see it" — exactly the failure mode WSLENV exists to
          # prevent.
          grep -q '^:ADDENV' "$BAT" \
            || (echo "FAIL: :ADDENV subroutine missing from $BAT — env-var loading is broken"; exit 1)
          grep -q 'kivun-env\.txt' "$BAT" \
            || (echo "FAIL: $BAT does not reference kivun-env.txt — picker output ignored"; exit 1)
          grep -q 'WSLENV' "$BAT" \
            || (echo "FAIL: $BAT does not set WSLENV — env vars set on Windows side will never reach WSL"; exit 1)
          # The :ADDENV body must include both the cmd-scope set AND the
          # WSLENV append. A regression that drops either leaves env vars
          # visible only on one side of the WSL boundary.
          awk '/^:ADDENV/{in_block=1; lines=0} in_block{print; lines++; if(/^exit \/b/) exit}' "$BAT" \
            | grep -q 'set "%~1=%~2"' \
            || (echo "FAIL: :ADDENV does not set the env var via 'set \"%~1=%~2\"'"; exit 1)
          awk '/^:ADDENV/{in_block=1; lines=0} in_block{print; lines++; if(/^exit \/b/) exit}' "$BAT" \
            | grep -q 'WSLENV=%WSLENV%:%~1\|WSLENV=%~1' \
            || (echo "FAIL: :ADDENV does not append the key to WSLENV"; exit 1)

          # ---- Linux side: while-read loop + export, NEVER source ----
          # `source kivun-env.txt` would re-evaluate $(...) and backticks in
          # user-typed values — same RCE class the existing CLAUDE_FLAGS
          # printf %q hardening guards against. The while-read+export pattern
          # treats values as literal strings.
          grep -q 'kivun-env\.txt' "$SH" \
            || (echo "FAIL: $SH does not read kivun-env.txt"; exit 1)
          grep -q 'while IFS= read' "$SH" \
            || (echo "FAIL: $SH does not use a while-read loop for env vars (regression to source?)"; exit 1)
          # Catch a regression to `source "$KIVUN_ENV_FILE"` or `. "$KIVUN_ENV_FILE"`.
          # Match only lines that actually look like they're sourcing the env file —
          # the launch-env.sh sourcing for CLAUDE_FLAGS is intentional and stays.
          if grep -E '(source|^\s*\.)\s+"?\$KIVUN_ENV_FILE"?' "$SH" >/dev/null 2>&1; then
            echo "FAIL: $SH sources kivun-env.txt — security regression (RCE via user-typed values)" >&2
            exit 1
          fi

          # ---- Picker (HTA) side: env-var parsing + masking + profile JSON ----
          # parseEnvVars validates KEY before the value reaches kivun-env.txt;
          # without it, malformed lines could smuggle into WSLENV.
          grep -q 'function parseEnvVars' "$HTA" \
            || (echo "FAIL: $HTA missing parseEnvVars validator"; exit 1)
          grep -q 'function writeEnvFile' "$HTA" \
            || (echo "FAIL: $HTA missing writeEnvFile (kivun-env.txt will never be written)"; exit 1)
          grep -q 'function loadProfiles' "$HTA" \
            || (echo "FAIL: $HTA missing loadProfiles (profile bar non-functional)"; exit 1)
          # Default-mask invariant: maskEnvValues must initialize to true.
          # If someone flips the default to false, env values leak into
          # screenshots silently — opposite of the explicit security choice.
          grep -qE 'var\s+maskEnvValues\s*=\s*true' "$HTA" \
            || (echo "FAIL: maskEnvValues default is not 'true' — values leak into preview by default"; exit 1)
          echo "PASS: all v1.4.0 env-var invariants intact"

  # -------------------------------------------------------------------------
  # Job 2 — Run the .bat against real WSL+Ubuntu and validate LAUNCH_LOG.
  # Scenario: WSL+Ubuntu present, Konsole NOT installed (we deliberately
  # don't pre-install it), Claude NOT installed. Drives the launcher down
  # the Konsole-fail -> :run_direct -> :no_claude_exit path. With the
  # v1.1.1 guard, this MUST exit cleanly without invoking claude.
  # -------------------------------------------------------------------------
  test-no-claude-no-konsole:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Confirm WSL is available on the runner
        shell: bash
        run: |
          set -e
          wsl --status
          wsl --version

      - name: Install Ubuntu in WSL (no-launch)
        shell: bash
        run: |
          set -e
          # windows-latest images pre-install WSL2 features. --no-launch
          # avoids the interactive user-creation prompt; we use --user root
          # for everything in CI so a regular user isn't required.
          wsl --install -d Ubuntu --no-launch
          # Probe Ubuntu directly — `wsl -l -v` output is UTF-16 LE on
          # Windows and parsing it from bash needs iconv juggling.
          end=$((SECONDS + 120))
          while [ $SECONDS -lt $end ]; do
            if wsl -d Ubuntu --user root -- bash -c "echo ready" >/dev/null 2>&1; then
              break
            fi
            sleep 5
          done
          wsl -d Ubuntu --user root -- bash -c "echo Ubuntu ready"

      - name: Confirm Claude is NOT in WSL (CI baseline)
        shell: bash
        run: |
          set -e
          r=$(wsl -d Ubuntu --user root -- bash -c "command -v claude || echo NOT_FOUND")
          echo "claude lookup: $r"
          if ! echo "$r" | grep -qF 'NOT_FOUND'; then
            echo "FAIL: Claude unexpectedly already installed in fresh Ubuntu" >&2
            exit 1
          fi

      - name: Run launcher and capture exit code
        shell: cmd
        # v1.1.3: install no longer prompts by default (AUTO_INSTALL_CLAUDE
        # defaults to "yes"). To exercise the no-Claude-exit path the
        # launcher needs config.txt with AUTO_INSTALL_CLAUDE=no, otherwise
        # it would auto-install instead of exiting.
        # The blank-line stdin remains as belt-and-suspenders for any
        # future pause prompts.
        continue-on-error: true
        run: |
          (echo AUTO_INSTALL_CLAUDE=no) > "payload\config.txt"
          (echo.) > "%RUNNER_TEMP%\launcher_input.txt"
          (echo.) >> "%RUNNER_TEMP%\launcher_input.txt"
          (echo.) >> "%RUNNER_TEMP%\launcher_input.txt"
          call payload\kivun-terminal.bat C:\temp < "%RUNNER_TEMP%\launcher_input.txt"
          set "RC=%ERRORLEVEL%"
          echo Captured launcher exit code: %RC%
          REM Parens are mandatory: without them, "echo LAUNCHER_EXITCODE=2>>file"
          REM is parsed by cmd as "echo LAUNCHER_EXITCODE=" + "2>>file" (stderr
          REM redirect), which silently drops the "2" from the env value.
          (echo LAUNCHER_EXITCODE=%RC%)>>"%GITHUB_ENV%"

      - name: Assert v1.1.1 invariants on LAUNCH_LOG.txt
        shell: bash
        run: |
          set -e
          log="$LOCALAPPDATA/Kivun-WSL/LAUNCH_LOG.txt"
          if [ ! -e "$log" ]; then
            echo "FAIL: LAUNCH_LOG.txt was not created at $log" >&2
            exit 1
          fi
          echo "----- LAUNCH_LOG.txt -----"
          cat "$log"
          echo "--------------------------"

          # Invariant 1: launcher must NOT contain the bug signature.
          # The v1.0.6 -> v1.1.0 bug was: ERROR - Claude Code not found
          # immediately followed by INFO - Executing: claude. That sequence
          # in the log means the launcher claimed to fall back and then
          # tried to run the missing binary. v1.1.1 must never do this.
          # `pcregrep -M` does multiline matching that ripgrep-style `grep
          # -P` doesn't span line breaks for. Fall back to awk if missing.
          if awk '
            /ERROR[[:space:]]*-[[:space:]]*Claude Code not found/ { found_err=1; next }
            found_err && /INFO[[:space:]]*-[[:space:]]*Executing:[[:space:]]*claude/ { exit 2 }
          ' "$log"; then
            : # awk exited 0 — sequence not seen
          else
            rc=$?
            if [ "$rc" = "2" ]; then
              echo "FAIL: bug signature present in LAUNCH_LOG (v1.1.1 regression)" >&2
              exit 1
            fi
            # awk error other than our exit 2 — propagate
            exit "$rc"
          fi
          echo "PASS: bug signature absent"

          # Invariant 2: the v1.1.1 :no_claude_exit message must be present.
          # This is the human-facing confirmation that the new path fired.
          if ! grep -qF 'EXIT - No Claude in WSL' "$log"; then
            echo "FAIL: expected v1.1.1 ':no_claude_exit' marker missing from log" >&2
            exit 1
          fi
          echo "PASS: :no_claude_exit was reached"

          # Invariant 3: launcher must have exited with code 2 (the
          # documented v1.1.1 exit code for absent-Claude + declined-install).
          if [ "$LAUNCHER_EXITCODE" != "2" ]; then
            echo "FAIL: launcher exit code was '$LAUNCHER_EXITCODE', expected 2" >&2
            exit 1
          fi
          echo "PASS: launcher exited with code 2"

      - name: Copy LAUNCH_LOG into workspace for upload
        if: always()
        shell: bash
        run: |
          src="$LOCALAPPDATA/Kivun-WSL/LAUNCH_LOG.txt"
          if [ -e "$src" ]; then
            cp "$src" LAUNCH_LOG.txt
            echo "Copied $src to workspace"
          else
            echo "WARNING: $src not present (launcher may have failed before logging)"
            echo "(LAUNCH_LOG was not created)" > LAUNCH_LOG.txt
          fi

      - name: Upload LAUNCH_LOG as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: LAUNCH_LOG-no-claude-decline
          path: LAUNCH_LOG.txt
          if-no-files-found: warn

  # -------------------------------------------------------------------------
  # Job 3 — Validate the AUTO-INSTALL path end-to-end.
  # Scenario: WSL+Ubuntu present, Konsole absent, Claude absent. Feed Y to
  # the install prompt. Wait for the launcher to actually install Claude
  # Code via curl https://claude.ai/install.sh inside Ubuntu, then assert
  # `claude --version` works inside WSL afterwards.
  # This is the path that matters most: it answers "will the launcher
  # actually install Claude for the user, or will the user have to do it
  # by hand?". If this job is green, the answer is "yes, automatically."
  # The launcher's process is killed after install confirms (it would
  # otherwise hang trying to run claude TUI without a real terminal).
  # -------------------------------------------------------------------------
  test-no-claude-accept-install:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Confirm WSL is available on the runner
        shell: bash
        run: |
          set -e
          wsl --status
          wsl --version

      - name: Install Ubuntu in WSL (no-launch)
        shell: bash
        run: |
          set -e
          wsl --install -d Ubuntu --no-launch
          end=$((SECONDS + 120))
          while [ $SECONDS -lt $end ]; do
            if wsl -d Ubuntu --user root -- bash -c "echo ready" >/dev/null 2>&1; then
              break
            fi
            sleep 5
          done
          wsl -d Ubuntu --user root -- bash -c "echo Ubuntu ready"

      - name: Confirm Claude is NOT in WSL (CI baseline)
        shell: bash
        run: |
          set -e
          r=$(wsl -d Ubuntu --user root -- bash -c "command -v claude || echo NOT_FOUND")
          echo "claude lookup: $r"
          if ! echo "$r" | grep -qF 'NOT_FOUND'; then
            echo "FAIL: Claude unexpectedly already installed in fresh Ubuntu" >&2
            exit 1
          fi

      - name: Stage stdin file (separate cmd step — files persist across steps)
        shell: cmd
        run: |
          (echo Y) > "%RUNNER_TEMP%\launcher_input.txt"
          (echo.) >> "%RUNNER_TEMP%\launcher_input.txt"
          (echo.) >> "%RUNNER_TEMP%\launcher_input.txt"
          (echo.) >> "%RUNNER_TEMP%\launcher_input.txt"
          (echo.) >> "%RUNNER_TEMP%\launcher_input.txt"

      - name: Run launcher + wait for SUCCESS marker (in same step, fail-fast at 4 min)
        shell: bash
        run: |
          # v1.1.32: combined launcher-launch + poll into ONE bash step.
          # The previous split (separate `start /B` step + poll step) hit a
          # GitHub Actions runner job-object cleanup: when the start-step
          # ended, its job object closed and KILLED the detached launcher
          # cmd along with its still-running install. Discovery test worked
          # because launcher exits in <1s; install test failed because
          # install takes 30s+ — far longer than the start-step's grace
          # period. CI runs 25018621910–25020283248 (v1.1.28–v1.1.32) all
          # confirmed: any sleep/wait mechanism in the launcher "hangs" not
          # because the mechanism itself is broken, but because the launcher
          # cmd is dead. Putting both launch + poll in ONE step keeps the
          # job alive for the full 5min and lets the launcher's setsid -w
          # install actually finish.
          rm -f "$LOCALAPPDATA/Kivun-WSL/LAUNCH_LOG.txt" 2>/dev/null || true
          # Backgrounded with `&` so this same shell can poll the log.
          # cmd inherits the bash step's job (alive for the full step).
          # cmd /c is correct (MSYS_NO_PATHCONV=1 prevents bash from
          # mangling /c into a path). v1.1.33 first attempt used //c
          # which made cmd start interactively and eat launcher_input.txt
          # as commands — bat never ran, LAUNCH_LOG never appeared.
          cmd /c "call payload\\kivun-terminal.bat C:\\temp < $RUNNER_TEMP/launcher_input.txt > launcher_stdout.txt 2> launcher_stderr.txt" &
          LAUNCHER_PID=$!
          log="$LOCALAPPDATA/Kivun-WSL/LAUNCH_LOG.txt"
          end=$((SECONDS + 240))
          install_succeeded=0
          install_failed=0
          install_timed_out=0
          while [ $SECONDS -lt $end ]; do
            if [ -e "$log" ]; then
              if grep -qF 'SUCCESS - Claude Code installed in WSL' "$log" 2>/dev/null; then
                install_succeeded=1
                break
              fi
              if grep -qF 'ERROR - Claude auto-install failed' "$log" 2>/dev/null; then
                install_failed=1
                break
              fi
              if grep -qF 'install.sh hit 600s timeout' "$log" 2>/dev/null; then
                install_timed_out=1
                break
              fi
            fi
            sleep 5
          done

          # Cleanup: kill the launcher cmd (now a direct bash child) and
          # its WSL children. With launcher in this step's job, killing
          # bash's child cmd cascades to wsl/bash.
          kill $LAUNCHER_PID 2>/dev/null || true
          for img in claude.exe wsl.exe cmd.exe; do
            taskkill /F /IM "$img" /T >/dev/null 2>&1 || true
          done

          if [ "$install_succeeded" = "1" ]; then
            echo "PASS: launcher logged 'SUCCESS - Claude Code installed in WSL'"
            exit 0
          fi

          # Anything else = fail. Dump every signal we have so the next
          # iteration can diagnose without a 15-min wait.
          echo "================================================================"
          echo "FAIL: install did not reach SUCCESS within 240s"
          echo "  install_failed=$install_failed install_timed_out=$install_timed_out"
          echo "================================================================"
          echo
          echo "===== LAUNCH_LOG.txt ====="
          cat "$log" 2>/dev/null || echo "(LAUNCH_LOG.txt missing)"
          echo
          echo "===== launcher_stdout.txt ====="
          cat launcher_stdout.txt 2>/dev/null || echo "(launcher_stdout.txt missing)"
          echo
          echo "===== launcher_stderr.txt ====="
          cat launcher_stderr.txt 2>/dev/null || echo "(launcher_stderr.txt missing)"
          echo
          echo "===== /tmp/kivun-claude.log (inside WSL) ====="
          wsl -d Ubuntu --user root -- bash -c "cat /tmp/kivun-claude.log 2>/dev/null || echo '(empty / missing)'"
          echo
          echo "===== /tmp/claude-installer.sh existence ====="
          wsl -d Ubuntu --user root -- bash -c "ls -la /tmp/claude-installer.sh /root/.local/bin/claude 2>&1 || true"
          echo
          echo "===== bat lines we expect to be running (v1.1.33 sanity check) ====="
          grep -nE 'setsid|kivun-install-claude\.sh|install\.sh returned|Auto-installing|_INST_WSL' payload/kivun-terminal.bat | head -15
          echo "===== /tmp/kivun-install-rc (inside WSL — should exist if install completed) ====="
          wsl -d Ubuntu --user root -- bash -c "ls -la /tmp/kivun-install-rc 2>&1; cat /tmp/kivun-install-rc 2>/dev/null || echo '(no rc file)'"
          echo "===== payload/kivun-install-claude.sh (v1.1.24) ====="
          ls -la payload/kivun-install-claude.sh 2>&1 | head -3
          echo
          echo "===== Live processes (post-cleanup) ====="
          # `MSYS_NO_PATHCONV=1` + `MSYS2_ARG_CONV_EXCL='*'` preserve `/FI`
          # literally, so we use single `/` here, not `//`. Earlier dump
          # used `//FI` and tasklist rejected with "Invalid argument/option".
          tasklist /FI "IMAGENAME eq cmd.exe" /FI "IMAGENAME eq wsl.exe" /FI "IMAGENAME eq bash.exe" 2>&1 | head -20
          echo "================================================================"
          exit 1

      - name: Assert no [Y/N] prompt appeared (v1.1.3 default-yes UX)
        shell: bash
        run: |
          set -e
          # The point of v1.1.3 is that a fresh user does NOT have to
          # type Y to get Claude installed. If this assertion ever
          # starts failing, somebody re-introduced the prompt as the
          # default and undid the UX fix.
          if grep -qF 'Install Claude Code in Ubuntu now' launcher_stdout.txt 2>/dev/null; then
            echo "----- launcher_stdout.txt -----"
            cat launcher_stdout.txt
            echo "FAIL: launcher prompted [Y/N] - v1.1.3 default-yes regressed" >&2
            exit 1
          fi
          echo "PASS: no [Y/N] prompt shown to user"

      - name: Assert :run_direct fallback can find claude (v1.1.4)
        shell: bash
        run: |
          set -e
          # In CI Konsole apt-install always fails (no GUI), so the
          # launcher hits :run_direct after the curl install succeeds.
          # If kivun-direct.sh cannot resolve claude (the v1.1.3 PATH
          # bug a real user hit), bash prints "claude: command not
          # found" before claude itself ever runs. v1.1.4 calls claude
          # via absolute path inside kivun-direct.sh, so this string
          # must never appear.
          if grep -qF 'claude: command not found' launcher_stdout.txt 2>/dev/null; then
            echo "----- launcher_stdout.txt -----"
            cat launcher_stdout.txt
            echo "FAIL: :run_direct could not locate claude binary (v1.1.4 regression)" >&2
            exit 1
          fi
          echo "PASS: :run_direct resolved claude (no 'command not found')"

      - name: Assert claude binary was installed by the launcher
        shell: bash
        run: |
          set -e
          # The launcher's auto-install path runs `claude.ai/install.sh`,
          # which (since 2026-04-27) ships a "native build" whose --version
          # exit chain is fragile in CI — even a working install can return
          # 127 when called via `bash -c` because the wrapper script's PATH
          # isn't set. We assert the binary exists at the expected slot
          # (same probe the launcher uses), not that --version succeeds.
          if ! wsl -d Ubuntu --user root -- bash -c "test -x /root/.local/bin/claude"; then
            echo "FAIL: /root/.local/bin/claude not present after launcher's auto-install" >&2
            wsl -d Ubuntu --user root -- bash -c "ls -la /root/.local/bin/ 2>&1 || true; find / -name claude -type f 2>/dev/null | head -10"
            exit 1
          fi
          echo "PASS: Claude Code binary installed at the launcher's expected absolute path"

      - name: Copy LAUNCH_LOG into workspace for upload
        if: always()
        shell: bash
        run: |
          src="$LOCALAPPDATA/Kivun-WSL/LAUNCH_LOG.txt"
          if [ -e "$src" ]; then
            cp "$src" LAUNCH_LOG.txt
          else
            echo "(LAUNCH_LOG was not created)" > LAUNCH_LOG.txt
          fi
          # Also pull the WSL-side install log for postmortem.
          wsl -d Ubuntu --user root -- bash -c "cat /tmp/kivun-claude.log 2>/dev/null" \
            > WSL_INSTALL_LOG.txt 2>/dev/null || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: LAUNCH_LOG-no-claude-accept-install
          path: |
            LAUNCH_LOG.txt
            WSL_INSTALL_LOG.txt
            launcher_stdout.txt
            launcher_stderr.txt
          if-no-files-found: warn

  # -------------------------------------------------------------------------
  # Job 4 — v1.1.5 regression: launcher must SEE an existing Claude install.
  # User report (2026-04-26): on Windows 11, the launcher reinstalled Claude
  # on EVERY launch ("דבילי") because its presence check used
  # `bash -c "command -v claude"` -- non-login bash whose PATH does not
  # include ~/.local/bin where curl install.sh drops the binary. v1.1.5
  # changes the check to a `test -x` chain over absolute install slots.
  # This job pre-installs Claude manually, then runs the launcher with
  # AUTO_INSTALL_CLAUDE=no so a regressed presence check would force the
  # launcher down :no_claude_exit (exit 2) instead of :claude_present.
  # The expected v1.1.5 behavior is exit-non-2 because the launcher saw
  # claude was already installed.
  # -------------------------------------------------------------------------
  test-existing-claude-no-reinstall:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Confirm WSL is available on the runner
        shell: bash
        run: |
          set -e
          wsl --status
          wsl --version

      - name: Install Ubuntu in WSL (no-launch)
        shell: bash
        run: |
          set -e
          wsl --install -d Ubuntu --no-launch
          end=$((SECONDS + 120))
          while [ $SECONDS -lt $end ]; do
            if wsl -d Ubuntu --user root -- bash -c "echo ready" >/dev/null 2>&1; then
              break
            fi
            sleep 5
          done
          wsl -d Ubuntu --user root -- bash -c "echo Ubuntu ready"

      - name: Pre-install Claude in Ubuntu (simulating a returning user)
        shell: bash
        run: |
          set -e
          # Drop claude into the same slot the launcher's curl installer
          # uses (~/.local/bin) so we exercise the exact path the bug
          # missed. Using the official installer keeps the test honest:
          # if Anthropic ever moves the install location, this job will
          # break and force the resolver to be updated alongside.
          wsl -d Ubuntu --user root -- bash -c \
            "curl -fsSL https://claude.ai/install.sh -o /tmp/c.sh && bash /tmp/c.sh && rm -f /tmp/c.sh"
          # Verify FILE existence at the v1.1.5 absolute slot — same
          # probe the launcher uses (`test -x`). Don't run --version:
          # the new install.sh native-build wrapper returns exit 127
          # in CI even when the file exists & is executable, because
          # its embedded interpreter chain expects PATH setup that the
          # install advertised but didn't perform.
          if ! wsl -d Ubuntu --user root -- bash -c "test -x /root/.local/bin/claude"; then
            echo "FAIL: /root/.local/bin/claude missing after install" >&2
            wsl -d Ubuntu --user root -- bash -c "ls -la /root/.local/bin/ 2>&1 || true"
            exit 1
          fi
          echo "Pre-installed claude at /root/.local/bin/claude (test -x OK)"

      - name: Build stdin and start launcher in background
        shell: cmd
        # AUTO_INSTALL_CLAUDE=no makes a regression LOUD: if the check
        # ever falsely reports "not found" again, the launcher exits 2
        # via :no_claude_exit instead of silently reinstalling.
        # `start /B` detaches so this step returns immediately.
        run: |
          (echo AUTO_INSTALL_CLAUDE=no) > "payload\config.txt"
          (echo.) > "%RUNNER_TEMP%\launcher_input.txt"
          (echo.) >> "%RUNNER_TEMP%\launcher_input.txt"
          (echo.) >> "%RUNNER_TEMP%\launcher_input.txt"
          start "" /B cmd /c "call payload\kivun-terminal.bat C:\temp < %RUNNER_TEMP%\launcher_input.txt > launcher_stdout.txt 2> launcher_stderr.txt"

      - name: Wait for claude-present marker, then kill
        # The launcher should see claude already installed, skip install,
        # head into Konsole stage. In CI Konsole launch fails (no GUI),
        # launcher falls into :run_direct and tries to spawn claude TUI
        # (which would hang). We poll LAUNCH_LOG for the claude-present
        # marker, then taskkill the children.
        shell: bash
        run: |
          log="$LOCALAPPDATA/Kivun-WSL/LAUNCH_LOG.txt"
          end=$((SECONDS + 300))
          saw_present=0
          saw_no_claude=0
          while [ $SECONDS -lt $end ]; do
            if [ -e "$log" ]; then
              if grep -qF 'SUCCESS - Claude Code is installed' "$log" 2>/dev/null; then
                saw_present=1
                break
              fi
              if grep -qF 'EXIT - No Claude in WSL' "$log" 2>/dev/null; then
                saw_no_claude=1
                break
              fi
            fi
            sleep 5
          done

          for img in claude.exe wsl.exe; do
            taskkill //F //IM "$img" //T >/dev/null 2>&1 || true
          done

          if [ "$saw_no_claude" = "1" ]; then
            echo "----- LAUNCH_LOG.txt -----"
            cat "$log"
            echo "FAIL: launcher hit :no_claude_exit even though Claude IS installed (v1.1.5 presence-check regression)" >&2
            exit 1
          fi
          if [ "$saw_present" = "0" ]; then
            echo "----- LAUNCH_LOG.txt -----"
            cat "$log" 2>/dev/null || echo "(log missing)"
            echo "FAIL: launcher never reached :claude_present within 5 min" >&2
            exit 1
          fi
          echo "PASS: launcher saw existing Claude install via the v1.1.5 absolute-path check"

      - name: Assert install branch was skipped (the actual bug)
        shell: bash
        run: |
          set -e
          log="$LOCALAPPDATA/Kivun-WSL/LAUNCH_LOG.txt"
          # Auto-install log line is the cheapest sentinel for the bug --
          # it appears whether AUTO_INSTALL_CLAUDE is yes or no, whenever
          # the presence check decided claude was missing.
          if grep -qE 'Auto-installing Claude|Installing Claude Code via official installer|User declined Claude auto-install|ERROR - Claude Code not found' "$log"; then
            echo "----- LAUNCH_LOG.txt -----"
            cat "$log"
            echo "FAIL: launcher entered install branch despite Claude already being installed (the user-reported bug)" >&2
            exit 1
          fi
          echo "PASS: install branch was skipped — no spurious reinstall"

      - name: Copy LAUNCH_LOG into workspace for upload
        if: always()
        shell: bash
        run: |
          src="$LOCALAPPDATA/Kivun-WSL/LAUNCH_LOG.txt"
          if [ -e "$src" ]; then
            cp "$src" LAUNCH_LOG.txt
          else
            echo "(LAUNCH_LOG was not created)" > LAUNCH_LOG.txt
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: LAUNCH_LOG-existing-claude-no-reinstall
          path: LAUNCH_LOG.txt
          if-no-files-found: warn

  # -------------------------------------------------------------------------
  # Job 5 — v1.1.6 active-discovery: launcher must find a claude install
  # at a NON-STANDARD path (e.g. simulating nvm/pnpm/yarn-global).
  # We pre-install claude at /opt/kivun-test/claude (NOT in any of the
  # absolute slots ~/.local/bin, /usr/local/bin, /usr/bin) and add that
  # dir to the WSL user's .bashrc so a login shell sees it. The v1.1.6
  # `bash -lc "command -v claude"` fallback must discover it; if the
  # launcher only checks the standard slots (the v1.1.5 behavior), it
  # will reinstall instead of skipping. With AUTO_INSTALL_CLAUDE=no a
  # regression turns into a loud :no_claude_exit.
  # -------------------------------------------------------------------------
  test-claude-discovery-from-bashrc:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Confirm WSL is available
        shell: bash
        run: |
          set -e
          wsl --status
          wsl --version

      - name: Install Ubuntu in WSL (no-launch)
        shell: bash
        run: |
          set -e
          wsl --install -d Ubuntu --no-launch
          end=$((SECONDS + 120))
          while [ $SECONDS -lt $end ]; do
            if wsl -d Ubuntu --user root -- bash -c "echo ready" >/dev/null 2>&1; then
              break
            fi
            sleep 5
          done
          wsl -d Ubuntu --user root -- bash -c "echo Ubuntu ready"

      - name: Install claude at a NON-STANDARD path + add to .bashrc
        shell: bash
        run: |
          set -e
          # Drop a stub `claude` binary in /opt/kivun-test (not in any
          # standard slot the resolver hard-codes) and put that dir on
          # PATH via root's .bashrc so a login shell finds it. This
          # simulates the nvm/pnpm/yarn pattern of "PATH gets set up
          # by rc files, not by the system default".
          #
          # We write a real bash script to disk on the Windows side
          # first (LF line endings), then exec it inside WSL. Inside
          # the script, bash quoting works exactly like it does on any
          # Linux machine — no Win32 cmdline-quoting middleware to fight.
          # Single-quote the whole `export PATH=` line so $PATH stays
          # literal on disk and expands at .bashrc-source time.
          # $RUNNER_TEMP is a Windows path with BACKSLASHES (e.g.
          # D:\a\_temp\...). Normalize to forward slashes BEFORE handing
          # the path to `wsl wslpath` — wsl.exe's Win32 cmdline parsing
          # eats backslashes in args, turning "D:\a\_temp\..." into
          # "D:a_temp..." and breaking wslpath.
          tmp_script="${RUNNER_TEMP//\\//}/kivun-stub-setup.sh"
          # Convert CRLF→LF as we write — Git Bash's printf may emit
          # CRLF on Windows runners depending on how heredocs are read.
          cat > "$tmp_script" <<'OUTER'
          #!/bin/bash
          set -e
          mkdir -p /opt/kivun-test
          cat > /opt/kivun-test/claude <<'STUB'
          #!/bin/bash
          echo "kivun-test claude stub v1.1.6 (non-standard PATH)"
          exit 0
          STUB
          chmod +x /opt/kivun-test/claude
          grep -q 'kivun-test' /root/.bashrc 2>/dev/null \
            || echo 'export PATH=/opt/kivun-test:$PATH' >> /root/.bashrc
          grep -q 'kivun-test' /root/.profile 2>/dev/null \
            || echo 'export PATH=/opt/kivun-test:$PATH' >> /root/.profile
          bash -lc 'command -v claude'
          OUTER
          # Strip 10-space indent the YAML add and force LF endings.
          sed -i 's/^          //; s/\r$//' "$tmp_script"

          echo "----- setup.sh contents -----"
          cat "$tmp_script"
          echo "------------------------------"

          # Compute /mnt/<drive>/... form via wsl wslpath. Strip the CR
          # wsl appends to its stdout on Windows.
          wsl_path=$(wsl wslpath -a "$tmp_script" | tr -d '\r')
          echo "Exec: wsl bash $wsl_path"
          wsl -d Ubuntu --user root -- bash "$wsl_path"

          # Negative check: standard absolute slots must NOT have claude,
          # otherwise the v1.1.6 discovery branch wouldn't fire and the
          # test wouldn't actually be testing what we think. These probes
          # are EXPECTED to exit 1 — capture and discard their exit code.
          for slot in /root/.local/bin/claude /usr/local/bin/claude /usr/bin/claude; do
            if wsl -d Ubuntu --user root -- bash -c "test -x $slot" >/dev/null 2>&1; then
              echo "FAIL: Test setup invalid: $slot exists but should be empty" >&2
              exit 1
            fi
          done
          echo "Setup OK: claude only at /opt/kivun-test, none of the standard slots."

      - name: Build stdin and start launcher in background
        shell: cmd
        run: |
          (echo AUTO_INSTALL_CLAUDE=no) > "payload\config.txt"
          (echo.) > "%RUNNER_TEMP%\launcher_input.txt"
          (echo.) >> "%RUNNER_TEMP%\launcher_input.txt"
          (echo.) >> "%RUNNER_TEMP%\launcher_input.txt"
          start "" /B cmd /c "call payload\kivun-terminal.bat C:\temp < %RUNNER_TEMP%\launcher_input.txt > launcher_stdout.txt 2> launcher_stderr.txt"

      - name: Wait for claude-present marker (fail-fast at 2 min) + diagnostic dump
        # v1.1.20: 2-min cap + full diagnostic dump. The 5-min wait + 1-line
        # FAIL message that this step used to print told us nothing — every
        # observed failure ended with LAUNCH_LOG truncated at "Reading
        # config.txt" with no clue what wsl/cmd/bash was actually doing.
        # Mirror the dump pattern from test-no-claude-accept-install so we
        # always know stdout/stderr, /tmp/* state inside WSL, and live
        # processes when a hang occurs.
        shell: bash
        run: |
          log="$LOCALAPPDATA/Kivun-WSL/LAUNCH_LOG.txt"
          end=$((SECONDS + 120))
          saw_present=0
          saw_no_claude=0
          while [ $SECONDS -lt $end ]; do
            if [ -e "$log" ]; then
              if grep -qF 'SUCCESS - Claude Code is installed' "$log" 2>/dev/null; then
                saw_present=1
                break
              fi
              if grep -qF 'EXIT - No Claude in WSL' "$log" 2>/dev/null; then
                saw_no_claude=1
                break
              fi
            fi
            sleep 5
          done

          # Cleanup BEFORE dumping — taskkill may free fds the dump needs.
          for img in claude.exe wsl.exe; do
            taskkill //F //IM "$img" //T >/dev/null 2>&1 || true
          done

          if [ "$saw_present" = "1" ]; then
            echo "PASS: launcher discovered claude at non-standard path via login-shell lookup"
            exit 0
          fi

          # Anything else = fail. Dump everything we have.
          echo "================================================================"
          if [ "$saw_no_claude" = "1" ]; then
            echo "FAIL: launcher hit :no_claude_exit despite claude being on PATH via .bashrc"
            echo "      (v1.1.6 active-discovery regression — discovery branch did not fire)"
          else
            echo "FAIL: launcher never reached :claude_present within 120s (silent hang)"
          fi
          echo "================================================================"
          echo
          echo "===== LAUNCH_LOG.txt ====="
          cat "$log" 2>/dev/null || echo "(LAUNCH_LOG.txt missing)"
          echo
          echo "===== launcher_stdout.txt ====="
          cat launcher_stdout.txt 2>/dev/null || echo "(launcher_stdout.txt missing)"
          echo
          echo "===== launcher_stderr.txt ====="
          cat launcher_stderr.txt 2>/dev/null || echo "(launcher_stderr.txt missing)"
          echo
          echo "===== payload/config.txt (test-staged) ====="
          cat payload/config.txt 2>/dev/null | od -c | head -5 || echo "(payload/config.txt missing)"
          echo
          echo "===== WSL discovery probes (re-run as root, what launcher SHOULD see) ====="
          echo "-- standard slots --"
          wsl -d Ubuntu --user root -- bash -c "for s in /root/.local/bin/claude /usr/local/bin/claude /usr/bin/claude; do test -x \$s && echo \"\$s present\" || echo \"\$s absent\"; done" 2>&1 || true
          echo "-- login-shell command -v --"
          wsl -d Ubuntu --user root -- bash -lc "command -v claude" 2>&1 || true
          echo "-- /opt/kivun-test stub --"
          wsl -d Ubuntu --user root -- bash -c "ls -la /opt/kivun-test/ 2>&1; head -3 /root/.bashrc 2>&1; tail -3 /root/.bashrc 2>&1" || true
          echo
          echo "===== bat config-parsing block we expect to be running ====="
          grep -nE 'Reading config.txt|for /f.*tokens.*config.txt|Config loaded|FOLDER_PICKER|Setting language-specific' payload/kivun-terminal.bat | head -10
          echo
          echo "===== Live processes (post-cleanup) ====="
          # See note in test-no-claude-accept-install dump: `/FI` not `//FI`
          # because workflow-level MSYS_NO_PATHCONV preserves it literally.
          tasklist /FI "IMAGENAME eq cmd.exe" /FI "IMAGENAME eq wsl.exe" /FI "IMAGENAME eq bash.exe" /FI "IMAGENAME eq findstr.exe" 2>&1 | head -25
          echo "================================================================"
          exit 1

      - name: Assert the discovery branch (not the standard-slot branch) fired
        shell: bash
        run: |
          set -e
          log="$LOCALAPPDATA/Kivun-WSL/LAUNCH_LOG.txt"
          # The v1.1.6 marker for the new login-shell fallback. If we
          # ever see SUCCESS without this line, that means the standard
          # slots somehow had claude and our test setup is broken.
          if ! grep -qF 'Claude found via login-shell PATH' "$log"; then
            echo "----- LAUNCH_LOG.txt -----"
            cat "$log"
            echo "FAIL: discovery branch did not fire -- standard slots had claude (test setup invalid)" >&2
            exit 1
          fi
          echo "PASS: v1.1.6 discovery branch fired as expected"

      - name: Copy LAUNCH_LOG into workspace for upload
        if: always()
        shell: bash
        run: |
          src="$LOCALAPPDATA/Kivun-WSL/LAUNCH_LOG.txt"
          if [ -e "$src" ]; then
            cp "$src" LAUNCH_LOG.txt
          else
            echo "(LAUNCH_LOG was not created)" > LAUNCH_LOG.txt
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: LAUNCH_LOG-claude-discovery-from-bashrc
          path: |
            LAUNCH_LOG.txt
            launcher_stdout.txt
            launcher_stderr.txt
          if-no-files-found: warn

  # -------------------------------------------------------------------------
  # Job 6 — v1.1.15 abort path AND v1.1.16 WSL_PATH=. fallback (bundled).
  # Bundles two regressions that escaped CI before:
  #   (a) v1.1.15 abort when WSL has no non-root user. The default
  #       windows-latest WSL Ubuntu (--no-launch) ships with root as the
  #       only user — exactly the scenario user 'mipmip' hit. With Claude
  #       pre-installed (so the launcher passes the claude-present check),
  #       the launcher must reach the user-detection block, fail to find
  #       UID 1000, and exit cleanly with helpful instructions.
  #   (b) v1.1.16 WSL_PATH=. fallback. wslpath returns the literal "."
  #       string when given "" or "." input. Pre-v1.1.16 the bash launcher
  #       would `cd .` into whatever cwd cmd inherited — typically the
  #       Kivun install dir when launched via the Desktop shortcut.
  # The test invokes the launcher TWICE in one CI job to share the WSL
  # setup cost. Run A uses "." arg (dot-fallback), Run B uses a normal
  # path arg (abort path). Each has its own assertions.
  # -------------------------------------------------------------------------
  test-v1115-abort-and-v1116-dot-fallback:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Confirm WSL is available
        shell: bash
        run: |
          set -e
          wsl --status
          wsl --version

      - name: Install Ubuntu in WSL (no-launch, default user = root)
        shell: bash
        run: |
          set -e
          wsl --install -d Ubuntu --no-launch
          # Probe Ubuntu directly instead of parsing `wsl -l -v` (UTF-16 output).
          end=$((SECONDS + 120))
          while [ $SECONDS -lt $end ]; do
            if wsl -d Ubuntu --user root -- bash -c "echo ready" >/dev/null 2>&1; then
              break
            fi
            sleep 5
          done
          wsl -d Ubuntu --user root -- bash -c "echo Ubuntu ready"

      - name: Confirm no UID 1000 user exists (the v1.1.15 abort scenario)
        shell: bash
        run: |
          set -e
          # The launcher's v1.1.15 fallback queries `id -un 1000` after
          # WSLg owner detection returns root or empty. UID 1000 must be
          # absent here so the abort path will fire in run B.
          out=$(wsl -d Ubuntu --user root -- bash -c "id -un 1000 2>&1; true")
          echo "id -un 1000: $out"
          if ! echo "$out" | grep -qE 'no such user|cannot find name'; then
            echo "FAIL: Test setup invalid: UID 1000 already exists, can't exercise abort path" >&2
            exit 1
          fi

      - name: Pre-install Claude as root in Ubuntu
        shell: bash
        run: |
          set -e
          # Pre-install Claude so the launcher passes the claude-present
          # check and reaches the v1.1.15 user-detection block. Without
          # Claude, the launcher exits earlier with EXIT - No Claude in WSL.
          wsl -d Ubuntu --user root -- bash -c "curl -fsSL https://claude.ai/install.sh -o /tmp/c.sh && bash /tmp/c.sh && rm -f /tmp/c.sh"
          # `test -x` only — same probe the launcher uses. --version
          # returns 127 even when the binary exists, because the new
          # native-build wrapper's interpreter chain assumes PATH
          # setup the install didn't actually do.
          if ! wsl -d Ubuntu --user root -- bash -c "test -x /root/.local/bin/claude"; then
            echo "FAIL: /root/.local/bin/claude missing after install" >&2
            exit 1
          fi
          echo "Pre-installed claude at /root/.local/bin/claude (test -x OK)"

      - name: 'Run A — launcher with "." arg (v1.1.16 dot-fallback)'
        shell: cmd
        continue-on-error: true
        run: |
          (echo AUTO_INSTALL_CLAUDE=no) > "payload\config.txt"
          (echo.) > "%RUNNER_TEMP%\input.txt"
          (echo.) >> "%RUNNER_TEMP%\input.txt"
          REM Pass "." literally — wslpath turns "." into ".", which is
          REM exactly the input pattern v1.1.16 added a fallback for.
          call payload\kivun-terminal.bat . < "%RUNNER_TEMP%\input.txt"
          set "RC_A=%ERRORLEVEL%"
          (echo RUN_A_EXITCODE=%RC_A%)>>"%GITHUB_ENV%"
          REM Snapshot the log after run A — run B's invocations append
          REM to the same LAUNCH_LOG.txt, so we'd lose the dot-fallback
          REM context window without snapshotting.
          copy "%LOCALAPPDATA%\Kivun-WSL\LAUNCH_LOG.txt" "LAUNCH_LOG_A.txt" >nul

      - name: 'Assert WSL_PATH="." was handled (v1.1.16 fallback OR v1.1.17 USERPROFILE upstream)'
        shell: bash
        run: |
          set -e
          echo "----- LAUNCH_LOG_A.txt (run with '.') -----"
          cat LAUNCH_LOG_A.txt
          echo "-------------------------------------------"
          # Two acceptable shapes for "the launcher handled `.` gracefully":
          #   v1.1.16 — wslpath returns ".", post-wslpath check substitutes ~
          #             marker: "Path conversion returned '.'"
          #   v1.1.17+ — WORK_DIR is normalized to %USERPROFILE% BEFORE wslpath
          #             marker: "WORK_DIR was '.', substituting USERPROFILE"
          # Either proves the launcher won't `cd .` into the install dir.
          # Neither = launcher is back to the v1.1.0 bug.
          if grep -qF "Path conversion returned '.'" LAUNCH_LOG_A.txt; then
            echo "PASS: v1.1.16 post-wslpath dot-fallback fired"
          elif grep -qF "WORK_DIR was '.', substituting USERPROFILE" LAUNCH_LOG_A.txt; then
            echo "PASS: v1.1.17 pre-wslpath USERPROFILE substitution fired"
          else
            echo "FAIL: neither v1.1.16 dot-fallback nor v1.1.17 USERPROFILE marker present — bug is back" >&2
            exit 1
          fi

      - name: 'Run B — launcher with normal path (v1.1.15 abort)'
        shell: cmd
        continue-on-error: true
        run: |
          (echo.) > "%RUNNER_TEMP%\input.txt"
          (echo.) >> "%RUNNER_TEMP%\input.txt"
          call payload\kivun-terminal.bat C:\temp < "%RUNNER_TEMP%\input.txt"
          set "RC_B=%ERRORLEVEL%"
          (echo RUN_B_EXITCODE=%RC_B%)>>"%GITHUB_ENV%"

      - name: Assert v1.1.15 abort fired in run B
        shell: bash
        run: |
          set -e
          # Git Bash auto-converts $LOCALAPPDATA to a Unix-style path that
          # `cat`/`grep` can read directly. No path-string surgery needed.
          log="$LOCALAPPDATA/Kivun-WSL/LAUNCH_LOG.txt"
          echo "----- LAUNCH_LOG.txt (full) -----"
          cat "$log"
          echo "---------------------------------"
          if ! grep -qE 'No non-root user \(UID 1000\) found' "$log"; then
            echo "FAIL: v1.1.15 abort log line missing — root-user-check regressed" >&2
            exit 1
          fi
          if [ "$RUN_B_EXITCODE" != "1" ]; then
            echo "FAIL: launcher exit code was '$RUN_B_EXITCODE', expected 1 (v1.1.15 abort)" >&2
            exit 1
          fi
          # Defense-in-depth: launcher must NOT pretend to fall through
          # past the abort. The fake fall-through (warn-then-crash) was
          # the v1.1.0 anti-pattern that ate user 'mipmip' twice.
          if grep -qE 'INFO - Launching Konsole|INFO - Falling back to direct' "$log"; then
            echo "FAIL: launcher proceeded past abort despite no UID 1000" >&2
            exit 1
          fi
          echo "PASS: v1.1.15 abort fired with exit 1 + no fake fall-through"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: LAUNCH_LOG-v1115-abort-and-v1116-dot-fallback
          path: |
            LAUNCH_LOG_A.txt
            LAUNCH_LOG.txt
          if-no-files-found: warn

  # -------------------------------------------------------------------------
  # Job 7 — v1.1.15 routes through UID 1000 when WSLg owner is root/empty.
  # Setup: create non-root user "kivuntest" at UID 1000 (the conventional
  # first interactive user), keep root as the wsl default user, install
  # Claude visible to the launcher's standard-slot probe. The launcher must
  #   1. Detect WSLg owner = root → discard
  #   2. Look up id -un 1000 → "kivuntest"
  #   3. Log "Will run as: kivuntest"
  #   4. Pass --user kivuntest to all subsequent wsl invocations
  # The Konsole launch will fail (no GUI) but we kill the launcher after
  # confirming the user-detection log marker.
  # -------------------------------------------------------------------------
  test-v1115-routes-through-uid-1000:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Confirm WSL is available
        shell: bash
        run: |
          set -e
          wsl --status

      - name: Install Ubuntu in WSL (no-launch)
        shell: bash
        run: |
          set -e
          wsl --install -d Ubuntu --no-launch
          end=$((SECONDS + 120))
          while [ $SECONDS -lt $end ]; do
            if wsl -d Ubuntu --user root -- bash -c "echo ready" >/dev/null 2>&1; then
              break
            fi
            sleep 5
          done
          wsl -d Ubuntu --user root -- bash -c "echo Ubuntu ready"

      - name: Create UID 1000 user "kivuntest" (default wsl user stays root)
        shell: bash
        run: |
          set -e
          # useradd (not adduser, which prompts interactively for full-name).
          # -u 1000 = the conventional first non-root UID the launcher's
          # v1.1.15 fallback queries via `id -un 1000`. -m creates the
          # home dir. Default wsl user is NOT changed — stays root, the
          # mipmip/root-default-user scenario.
          wsl -d Ubuntu --user root -- bash -c "useradd -u 1000 -m -s /bin/bash kivuntest && id kivuntest"
          u=$(wsl -d Ubuntu --user root -- bash -c "id -un 1000" | tr -d '\r\n')
          echo "id -un 1000: '$u'"
          if [ "$u" != "kivuntest" ]; then
            echo "FAIL: Setup wrong: id -un 1000 returned '$u', expected 'kivuntest'" >&2
            exit 1
          fi

      - name: Pre-install Claude system-wide so the launcher's probe finds it
        shell: bash
        run: |
          set -e
          # Install as kivuntest so $HOME resolves correctly, then
          # symlink to /usr/local/bin so the launcher's claude-present
          # probe (which tests $HOME/.local/bin/claude || /usr/local/bin/claude)
          # finds it from any user context.
          wsl -d Ubuntu --user kivuntest -- bash -c "curl -fsSL https://claude.ai/install.sh -o /tmp/c.sh && bash /tmp/c.sh && rm -f /tmp/c.sh"
          wsl -d Ubuntu --user root -- bash -c "ln -sf /home/kivuntest/.local/bin/claude /usr/local/bin/claude && /usr/local/bin/claude --version"

      - name: Build stdin and start launcher in background
        shell: cmd
        run: |
          (echo AUTO_INSTALL_CLAUDE=no) > "payload\config.txt"
          (echo.) > "%RUNNER_TEMP%\launcher_input.txt"
          (echo.) >> "%RUNNER_TEMP%\launcher_input.txt"
          (echo.) >> "%RUNNER_TEMP%\launcher_input.txt"
          start "" /B cmd /c "call payload\kivun-terminal.bat C:\temp < %RUNNER_TEMP%\launcher_input.txt > launcher_stdout.txt 2> launcher_stderr.txt"

      - name: 'Wait for Will-run-as kivuntest marker, then kill'
        shell: bash
        run: |
          log="$LOCALAPPDATA/Kivun-WSL/LAUNCH_LOG.txt"
          end=$((SECONDS + 300))
          saw_marker=0
          saw_abort=0
          while [ $SECONDS -lt $end ]; do
            if [ -e "$log" ]; then
              if grep -qF 'Will run as: kivuntest' "$log" 2>/dev/null; then
                saw_marker=1
                break
              fi
              if grep -qE 'No non-root user \(UID 1000\) found' "$log" 2>/dev/null; then
                saw_abort=1
                break
              fi
            fi
            sleep 5
          done

          for img in claude.exe wsl.exe; do
            taskkill //F //IM "$img" //T >/dev/null 2>&1 || true
          done

          if [ "$saw_abort" = "1" ]; then
            echo "----- LAUNCH_LOG.txt -----"
            cat "$log"
            echo "FAIL: launcher hit abort path despite UID 1000 existing — v1.1.15 fallback regressed" >&2
            exit 1
          fi
          if [ "$saw_marker" = "0" ]; then
            echo "----- LAUNCH_LOG.txt -----"
            cat "$log" 2>/dev/null || echo "(log missing)"
            echo "FAIL: launcher never logged 'Will run as: kivuntest' within 5 min" >&2
            exit 1
          fi
          echo "PASS: v1.1.15 routed through UID 1000 user as expected"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: LAUNCH_LOG-v1115-uid-1000-routing
          path: |
            LAUNCH_LOG.txt
            launcher_stdout.txt
            launcher_stderr.txt
          if-no-files-found: warn

  # -------------------------------------------------------------------------
  # Job 8 — v1.1.14 + v1.1.15 EUID guards in kivun-launch.sh + kivun-direct.sh.
  # The .bat already prevents these scripts from being called as root in
  # the normal flow (--user is always set to a non-root user). But the
  # guards are defense-in-depth: if upstream WSL/distro changes break the
  # .bat detection, OR if someone calls the .sh files directly via wsl
  # --user root, both scripts must refuse cleanly with copy-paste-able
  # instructions instead of letting Claude show its cryptic "exited
  # with code 1 — --dangerously-skip-permissions cannot be used with
  # root" error.
  # -------------------------------------------------------------------------
  test-sh-scripts-refuse-root:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Confirm WSL is available
        shell: bash
        run: |
          set -e
          wsl --status

      - name: Install Ubuntu in WSL (no-launch)
        shell: bash
        run: |
          set -e
          wsl --install -d Ubuntu --no-launch
          end=$((SECONDS + 120))
          while [ $SECONDS -lt $end ]; do
            if wsl -d Ubuntu --user root -- bash -c "echo ready" >/dev/null 2>&1; then
              break
            fi
            sleep 5
          done
          wsl -d Ubuntu --user root -- bash -c "echo Ubuntu ready"

      - name: Compute payload path inside WSL (no hardcoded username)
        shell: bash
        run: |
          set -e
          # Derive the WSL form of $GITHUB_WORKSPACE/payload dynamically.
          # Use `wsl wslpath` rather than string surgery — it's the same
          # tool the launcher uses, so we get an apples-to-apples WSL path.
          # Strip the CR that wsl appends to its stdout on Windows.
          wsl_payload=$(wsl wslpath -a "$(pwd -W 2>/dev/null || pwd)/payload" | tr -d '\r')
          echo "payload (WSL): $wsl_payload"
          echo "WSL_PAYLOAD=$wsl_payload" >> "$GITHUB_ENV"

      - name: Strip CRLF from .sh files (Windows checkout adds CRLF)
        shell: bash
        run: |
          set -e
          # The launcher .bat does this in production. Bash on the runner
          # would otherwise hit "$'\r': command not found" on every line.
          wsl -d Ubuntu --user root -- bash -c "sed -i 's/\r\$//' '$WSL_PAYLOAD/kivun-launch.sh' '$WSL_PAYLOAD/kivun-direct.sh'"

      - name: 'kivun-direct.sh as root → must exit 1 with refusal message'
        shell: bash
        run: |
          # The script intentionally exits 1 (the v1.1.15 EUID-as-root guard).
          # `cmd && rc=0 || rc=$?` captures the actual non-zero exit
          # without `|| true` overwriting it (which the previous attempt
          # did, making rc always 0).
          out=$(wsl -d Ubuntu --user root -- bash "$WSL_PAYLOAD/kivun-direct.sh" /tmp "test-prompt" 2>&1) && rc=0 || rc=$?
          echo "----- kivun-direct.sh stdout/stderr -----"
          echo "$out"
          echo "----- exit code: $rc -----"
          if [ "$rc" != "1" ]; then
            echo "FAIL: kivun-direct.sh exit code was $rc, expected 1 (v1.1.15 EUID guard)" >&2
            exit 1
          fi
          if ! echo "$out" | grep -qF 'Kivun direct-fallback is running as root'; then
            echo "FAIL: refusal message missing — kivun-direct.sh let root through" >&2
            exit 1
          fi
          if ! echo "$out" | grep -qF 'wsl -d Ubuntu --user root -- adduser'; then
            echo "FAIL: copy-paste-able fix instructions missing from refusal output" >&2
            exit 1
          fi
          echo "PASS: kivun-direct.sh refused root with exit 1 + helpful instructions"

      - name: 'kivun-launch.sh as root → must exit 1 with refusal message'
        shell: bash
        run: |
          # 7 positional args, all with defaults — the EUID guard fires
          # before they're consumed, so dummy values are fine.
          out=$(wsl -d Ubuntu --user root -- bash "$WSL_PAYLOAD/kivun-launch.sh" \
            "/tmp" "test-prompt" "hebrew" "false" "/tmp/k.log" "rtl" "0 0 1024 768" 2>&1) && rc=0 || rc=$?
          echo "----- kivun-launch.sh stdout/stderr -----"
          echo "$out"
          echo "----- exit code: $rc -----"
          if [ "$rc" != "1" ]; then
            echo "FAIL: kivun-launch.sh exit code was $rc, expected 1 (v1.1.14 EUID guard)" >&2
            exit 1
          fi
          if ! echo "$out" | grep -qF 'Kivun launcher is running as root'; then
            echo "FAIL: refusal message missing — kivun-launch.sh let root through" >&2
            exit 1
          fi
          echo "PASS: kivun-launch.sh refused root with exit 1 + helpful instructions"
