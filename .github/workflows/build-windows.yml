name: Build Windows Installer

on:
  push:
    tags:
      - 'v1.*'
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify VERSION matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version=$(tr -d '[:space:]' < VERSION)
          if [ "$tag" != "$version" ]; then
            echo "ERROR: VERSION file ($version) does not match tag ($tag). Update VERSION before tagging." >&2
            exit 1
          fi
          echo "OK: VERSION $version matches tag $tag"

      - name: Install NSIS
        run: |
          choco install nsis -y --no-progress
          echo "NSIS installed"

      - name: Build installer
        working-directory: installer
        run: |
          MSYS_NO_PATHCONV=1 "/c/Program Files (x86)/NSIS/makensis.exe" -V3 Kivun_Terminal_Setup.nsi
          if [ ! -f Kivun_Terminal_Setup.exe ]; then
            echo "ERROR: makensis did not produce Kivun_Terminal_Setup.exe" >&2
            exit 1
          fi
          size_kb=$(( $(stat -c%s Kivun_Terminal_Setup.exe) / 1024 ))
          echo "Built Kivun_Terminal_Setup.exe (${size_kb} KB)"

      - name: Upload installer as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kivun_Terminal_Setup
          path: installer/Kivun_Terminal_Setup.exe
          if-no-files-found: error

      - name: Build release notes for this tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          # Prefer a hand-written user-facing file at docs/RELEASE_NOTES_<version>.md
          # (download steps, what's new in plain English, feature table) — if absent,
          # fall back to extracting the CHANGELOG section, which is more technical.
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          NOTES_FILE="docs/RELEASE_NOTES_${VERSION}.md"
          if [ -f "$NOTES_FILE" ]; then
            cp "$NOTES_FILE" /tmp/release-notes.md
            echo "Using hand-written ${NOTES_FILE}"
          else
            awk -v ver="$VERSION" '
              $0 ~ "^## \\["ver"\\]" { in_section = 1; print; next }
              /^## \[/ { if (in_section) exit }
              in_section { print }
            ' docs/CHANGELOG.md > /tmp/release-notes.md
            if [ ! -s /tmp/release-notes.md ]; then
              echo "Release ${TAG}." > /tmp/release-notes.md
            fi
            echo "Using CHANGELOG section for ${VERSION} (no ${NOTES_FILE} found)"
          fi
          echo "----- /tmp/release-notes.md -----"
          cat /tmp/release-notes.md
          echo "----- end -----"

      - name: Attach installer to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: installer/Kivun_Terminal_Setup.exe
          body_path: /tmp/release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
